name: Tests

on:
  workflow_call:
    inputs:
      elixir-version:
        required: true
        type: string
      otp-version:
        required: true
        type: string

env:
  MIX_ENV: test

jobs:
  test:
    name: Elixir Tests (${{ matrix.partition }}/4)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        partition: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beamwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-elixir
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}

      - name: Run tests
        run: mix test --partitions 4
        env:
          MIX_TEST_PARTITION: ${{ matrix.partition }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beamwatch_test

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beamwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-elixir
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}

      - name: Run coverage
        run: mix coveralls.html
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beamwatch_test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: cover/
          retention-days: 7
